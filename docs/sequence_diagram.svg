<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="940" viewBox="0 0 1400 940">
  <defs>
    <style>
      .title { font: 700 22px "Segoe UI", Arial, sans-serif; fill: #0b1020; }
      .sub { font: 400 13px "Segoe UI", Arial, sans-serif; fill: #334155; }
      .hdr { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1; }
      .lane { stroke: #94a3b8; stroke-width: 1; stroke-dasharray: 6 6; }
      .msg { stroke: #1e293b; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
      .reply { stroke: #475569; stroke-width: 1.4; stroke-dasharray: 4 5; fill: none; marker-end: url(#arrow); }
      .note { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; }
      .step { font: 700 12px "Segoe UI", Arial, sans-serif; fill: #334155; }
      .txt { font: 400 12px Consolas, "SFMono-Regular", Menlo, monospace; fill: #0f172a; }
      .lbl { font: 600 12px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .pill { fill: #eef2ff; stroke: #c7d2fe; stroke-width: 1; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e293b"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1400" height="940" fill="url(#bg)"/>

  <text x="40" y="52" class="title">TradeAnalytics — Main Sequence Diagram (Frontend + Backend)</text>
  <text x="40" y="76" class="sub">Covers Home → Sectors → Sector Stocks → Login → Portfolio Analytics (PCA/KMeans) → CSV downloads</text>

  <!-- Participant headers -->
  <g>
    <rect x="40" y="110" width="220" height="44" rx="10" class="hdr"/>
    <text x="150" y="138" text-anchor="middle" class="lbl">User</text>

    <rect x="300" y="110" width="220" height="44" rx="10" class="hdr"/>
    <text x="410" y="138" text-anchor="middle" class="lbl">Browser (React UI)</text>

    <rect x="560" y="110" width="220" height="44" rx="10" class="hdr"/>
    <text x="670" y="138" text-anchor="middle" class="lbl">localStorage</text>

    <rect x="820" y="110" width="260" height="44" rx="10" class="hdr"/>
    <text x="950" y="138" text-anchor="middle" class="lbl">Django API (Backend)</text>

    <rect x="1120" y="110" width="240" height="44" rx="10" class="hdr"/>
    <text x="1240" y="138" text-anchor="middle" class="lbl">Client Analytics</text>
  </g>

  <!-- Lifelines -->
  <g>
    <line x1="150" y1="160" x2="150" y2="900" class="lane"/>
    <line x1="410" y1="160" x2="410" y2="900" class="lane"/>
    <line x1="670" y1="160" x2="670" y2="900" class="lane"/>
    <line x1="950" y1="160" x2="950" y2="900" class="lane"/>
    <line x1="1240" y1="160" x2="1240" y2="900" class="lane"/>
  </g>

  <!-- Steps -->
  <!-- 1: Home + NIFTY -->
  <text x="40" y="198" class="step">1</text>
  <path d="M150 200 L410 200" class="msg"/>
  <text x="280" y="192" text-anchor="middle" class="txt">Open /home</text>

  <text x="40" y="238" class="step">2</text>
  <path d="M410 240 L950 240" class="msg"/>
  <text x="680" y="232" text-anchor="middle" class="txt">GET /all-sector-stocks/timeseries/bitcoin/?symbol=^NSEI&amp;period=3mo&amp;interval=1d</text>

  <text x="40" y="278" class="step">3</text>
  <path d="M950 280 L410 280" class="reply"/>
  <text x="680" y="272" text-anchor="middle" class="txt">200 { history... }</text>

  <rect x="330" y="295" width="360" height="44" rx="12" class="note"/>
  <text x="350" y="322" class="sub">UI renders NIFTY graph (click opens modal)</text>

  <!-- 2: Sectors -->
  <text x="40" y="374" class="step">4</text>
  <path d="M150 376 L410 376" class="msg"/>
  <text x="280" y="368" text-anchor="middle" class="txt">Navigate /sectors</text>

  <text x="40" y="414" class="step">5</text>
  <path d="M410 416 L950 416" class="msg"/>
  <text x="680" y="408" text-anchor="middle" class="txt">GET /all-sector-stocks/</text>

  <text x="40" y="454" class="step">6</text>
  <path d="M950 456 L410 456" class="reply"/>
  <text x="680" y="448" text-anchor="middle" class="txt">200 { data:[{sector,...}] }</text>

  <rect x="330" y="471" width="360" height="44" rx="12" class="note"/>
  <text x="350" y="498" class="sub">UI shows sector pills + insights</text>

  <!-- 3: Sector stocks -->
  <text x="40" y="554" class="step">7</text>
  <path d="M150 556 L410 556" class="msg"/>
  <text x="280" y="548" text-anchor="middle" class="txt">Open /stock/:sector</text>

  <text x="40" y="594" class="step">8</text>
  <path d="M410 596 L950 596" class="msg"/>
  <text x="680" y="588" text-anchor="middle" class="txt">GET /all-sector-stocks/crud/stocks/ (sector filter)</text>

  <text x="40" y="634" class="step">9</text>
  <path d="M950 636 L410 636" class="reply"/>
  <text x="680" y="628" text-anchor="middle" class="txt">200 [{symbol, price, pe_ratio, ...}]</text>

  <!-- 4: Login -->
  <text x="40" y="698" class="step">10</text>
  <path d="M150 700 L410 700" class="msg"/>
  <text x="280" y="692" text-anchor="middle" class="txt">Login</text>

  <text x="40" y="738" class="step">11</text>
  <path d="M410 740 L950 740" class="msg"/>
  <text x="680" y="732" text-anchor="middle" class="txt">POST /user/login/</text>

  <text x="40" y="778" class="step">12</text>
  <path d="M950 780 L410 780" class="reply"/>
  <text x="680" y="772" text-anchor="middle" class="txt">200 {token/id/...}</text>

  <text x="40" y="818" class="step">13</text>
  <path d="M410 820 L670 820" class="msg"/>
  <text x="540" y="812" text-anchor="middle" class="txt">set current_user</text>

  <!-- 5: Portfolio analytics -->
  <text x="40" y="858" class="step">14</text>
  <path d="M150 860 L410 860" class="msg"/>
  <text x="280" y="852" text-anchor="middle" class="txt">Open /portfolio</text>

  <text x="40" y="898" class="step">15</text>
  <path d="M410 900 L670 900" class="msg"/>
  <text x="540" y="892" text-anchor="middle" class="txt">read user_portfolio_stocks_v1</text>
</svg>

